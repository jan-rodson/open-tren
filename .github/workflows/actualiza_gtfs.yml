name: Actualizar GTFS

on:
  schedule:
    - cron: '0 3 * * 0'  # Cada domingo a las 3 AM UTC
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Sync dependencies
        run: uv sync

      - name: Ejecutar actualización
        run: uv run python scripts/actualizar_gtfs.py

      - name: Get timestamp
        id: timestamp
        run: echo "time=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Upload artifact with date
        uses: actions/upload-artifact@v4
        with:
          name: gtfs-static-${{ steps.timestamp.outputs.time }}
          path: data/gtfs/
          retention-days: 90
